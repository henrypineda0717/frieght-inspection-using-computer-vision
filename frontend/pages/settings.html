<!-- Settings fragment – compact, with consistent left/right padding -->
<style>
    /* Settings page styles – add to global CSS or keep here */
    .settings-page {
        max-width: 1200px;
        margin: 0 auto;
    }
    .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 20px;
    }

    .settings-section {
        background: var(--bg-secondary);
        border-radius: var(--radius-md);
        padding: 16px;
        border: var(--border-width) solid var(--border-light);
    }

    .settings-section h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 16px;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: var(--border-width) solid var(--border-medium);
        padding-bottom: 8px;
    }

    .settings-section h3 i {
        color: var(--accent-blue);
        font-size: 1.1rem;
    }

    .form-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 16px;
    }

    .form-row label {
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .form-row label i {
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
        padding: 8px 10px;
        background: white;
        border: var(--border-width) solid var(--border-medium);
        border-radius: var(--radius-md);
        font-size: 0.85rem;
        color: var(--text-primary);
        font-family: inherit;
    }

    .form-row input[type="range"] {
        padding: 0;
        background: transparent;
    }

    .range-with-value {
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .range-with-value span {
        min-width: 45px;
        font-size: 0.85rem;
        color: var(--accent-blue);
        font-weight: 600;
    }

    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
    }
    .checkbox-row input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--accent-blue);
    }

    .toggle-switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
        margin-right: 10px;
    }
    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }
    .toggle-slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--border-medium);
        transition: .2s;
        border-radius: 24px;
    }
    .toggle-slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 2px;
        bottom: 2px;
        background-color: white;
        transition: .2s;
        border-radius: 50%;
    }
    input:checked + .toggle-slider {
        background-color: var(--accent-blue);
    }
    input:checked + .toggle-slider:before {
        transform: translateX(20px);
    }

    .settings-actions {
        display: flex;
        gap: 12px;
        margin-top: 24px;
        justify-content: flex-end;
    }
</style>

<div class="card settings-page" style="padding: 20px;">
    <h2 style="margin-bottom: 20px; font-size: 1.4rem;">System Settings</h2>
    
    <!-- Settings grid -->
    <div class="settings-grid">
        <!-- General -->
        <div class="settings-section">
            <h3><i class="fas fa-sliders-h"></i> General</h3>
            <div class="form-row">
                <label><i class="far fa-clock"></i> Default Stage</label>
                <select>
                    <option value="pre">Pre‑wash</option>
                    <option value="post" selected>Post‑wash</option>
                </select>
            </div>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox" checked>
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Auto‑save inspection results</span>
            </div>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Generate PDF reports automatically</span>
            </div>
        </div>

        <!-- Camera -->
        <div class="settings-section">
            <h3><i class="fas fa-camera"></i> Camera</h3>
            <div class="form-row">
                <label>Video source</label>
                <input type="text" value="/dev/video0" placeholder="e.g., /dev/video0 or IP camera URL">
            </div>
            <div class="form-row">
                <label>Resolution</label>
                <select>
                    <option>1920x1080</option>
                    <option selected>1280x720</option>
                    <option>640x480</option>
                </select>
            </div>
            <div class="form-row">
                <label>Frame rate (fps)</label>
                <input type="number" min="1" max="60" value="30">
            </div>
            <div class="form-row">
                <label>Exposure compensation</label>
                <div class="range-with-value">
                    <input type="range" min="-2" max="2" step="0.1" value="0">
                    <span>0.0</span>
                </div>
            </div>
        </div>

        <!-- Detection -->
        <div class="settings-section">
            <h3><i class="fas fa-search"></i> Detection</h3>
            <div class="form-row">
                <label>Sensitivity</label>
                <div class="range-with-value">
                    <input type="range" min="0" max="100" value="75">
                    <span>75%</span>
                </div>
            </div>
            <div class="form-row">
                <label>Min. detection size (pixels)</label>
                <input type="number" min="10" value="50" step="5">
            </div>
            <div class="form-row">
                <label>Contamination threshold (%)</label>
                <input type="number" min="0" max="100" value="15">
            </div>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox" checked>
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Enable dark spot detection</span>
            </div>
        </div>

        <!-- Alerts -->
        <div class="settings-section">
            <h3><i class="fas fa-bell"></i> Alerts</h3>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox" checked>
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Enable visual alerts</span>
            </div>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Play sound on alert</span>
            </div>
            <div class="form-row">
                <label>Email notifications</label>
                <input type="email" placeholder="admin@company.com" value="ops@mcsrobotics.com">
            </div>
            <div class="form-row">
                <label>Alert threshold (detections)</label>
                <input type="number" min="1" value="3">
            </div>
        </div>

        <!-- Advanced -->
        <div class="settings-section">
            <h3><i class="fas fa-microchip"></i> Advanced</h3>
            <div class="form-row">
                <label>AI Model</label>
                <select>
                    <option>Standard (v2.1)</option>
                    <option selected>High Accuracy (v2.3)</option>
                    <option>Fast Inference (v1.9)</option>
                </select>
            </div>
            <div class="checkbox-row">
                <label class="toggle-switch">
                    <input type="checkbox">
                    <span class="toggle-slider"></span>
                </label>
                <span style="font-size:0.9rem;">Enable debug logging</span>
            </div>
            <div class="form-row">
                <label>API endpoint (optional)</label>
                <input type="text" placeholder="http://localhost:5000/api">
            </div>
        </div>
    </div>

    <!-- Action buttons -->
    <div class="settings-actions">
        <button class="btn btn-secondary"><i class="fas fa-undo-alt"></i> Reset to Defaults</button>
        <button class="btn btn-primary"><i class="fas fa-save"></i> Save Settings</button>
    </div>
</div>

<!-- Simple range display script -->
<script>
    (function() {
        document.querySelectorAll('.range-with-value input[type="range"]').forEach(range => {
            const span = range.nextElementSibling;
            if (!span) return;
            const update = () => {
                span.textContent = range.value + (range.max == '100' ? '%' : '');
            };
            range.addEventListener('input', update);
            update(); // set initial
        });
    })();
</script>
