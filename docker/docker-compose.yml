version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: container-inspection-system
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/app/storage
      - ../models:/app/models
      - ../data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./inspections.db
      - DEBUG=False
      - PYTHONPATH=/app
    env_file:
      - ../backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

